<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Gym Management</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-wrap" style="min-height:100vh; display:block; padding:40px 20px;">
  <div style="max-width:600px; margin:0 auto;">
    <div style="text-align:center; margin-bottom:32px;">
      <div class="login-logo">💪 IRONCORE</div>
      <p class="login-subtitle" style="margin:0;">Create your member account</p>
    </div>

    <div class="card">
      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('member_register') }}">
        <h3 class="section-title" style="font-size:18px; border:none; padding:0; margin-bottom:20px;">Personal Information</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" required placeholder="John Smith">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required placeholder="john@email.com">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required minlength="6" placeholder="Min 6 characters">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" required placeholder="555-0101">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="date_of_birth" required>
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select name="gender" required>
              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" name="address" placeholder="123 Main Street, City">
        </div>

        <h3 class="section-title" style="font-size:18px; border-color:var(--border); margin-top:24px;">Membership Details</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Membership Plan</label>
            <select name="plan_id" required>
              <option value="">Select a Plan</option>
              {% for plan in plans %}
              <option value="{{ plan.id }}">{{ plan.plan_name }} — ${{ plan.price }}/{{ plan.duration_months }} month(s)</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" name="join_date" required>
          </div>
        </div>
        <div class="form-group">
          <label>Fitness Goal</label>
          <input type="text" name="fitness_goal" placeholder="e.g. Lose weight, Build muscle, Improve endurance">
        </div>

        <div class="form-buttons">
          <button type="submit" class="btn btn-primary" style="background:var(--blue);">Create Account →</button>
          <a href="{{ url_for('member_login') }}" class="btn btn-secondary">Already a member? Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
